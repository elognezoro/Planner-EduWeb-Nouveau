<svg viewBox="0 0 1040 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Eduweb — Le web au service de l'éducation">
  <rect width="1040" height="560" rx="30" fill="#3e5851"/>
  <!-- Aire verte du graphe de croissance -->
  <polygon points="486,404 940,404 940,176" fill="#5bb489"/>
  <!-- Flèche de croissance orange (zigzag ascendant) -->
