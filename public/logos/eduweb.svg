  <polygon points="936,150 900,158 926,196" fill="#f4a621"/>
  <!-- Mot-symbole « Eduweb » -->
  <text x="56" y="368" font-family="Arial, 'Segoe UI', Helvetica, sans-serif" font-weight="800" font-size="250" fill="#5bb489">Edu</text>
  <text x="742" y="368" font-family="Arial, 'Segoe UI', Helvetica, sans-serif" font-weight="800" font-size="152" fill="#ffffff">eb</text>
  <!-- Slogan -->
  <text x="520" y="502" text-anchor="middle" font-family="Arial, 'Segoe UI', Helvetica, sans-serif" font-weight="400" font-size="54" fill="#ffffff">Le web au service de l'éducation</text>
